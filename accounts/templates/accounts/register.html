{% extends "base.html" %}

{% block content %}
<h2>Registro</h2>

<form method="post">
  {% csrf_token %}
  <input type="text" name="username" placeholder="Usuario">
  <input type="password" name="password" placeholder="Contraseña">
  <button type="submit">Crear cuenta</button>
</form>

{% if error %}
<p>{{ error }}</p>
{% endif %}

<a href="{% url 'login' %}">Login</a>
{% endblock %}
