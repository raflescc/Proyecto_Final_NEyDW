{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Artworks</h2>

<div class="row">
    {% for art in artworks %}
        <div class="col-md-4 mb-4">
            <div class="card h-100">

                {% if art.image %}
                    <img src="{{ art.image.url }}" class="card-img-top" alt="{{ art.title }}">
                {% endif %}

                <div class="card-body">
                    <h5 class="card-title">{{ art.title }}</h5>
                    <p class="card-text">${{ art.price }}</p>
                </div>

                <div class="card-footer text-center">
                    <a href="{% url 'artwork_detail' art.id %}" class="btn btn-primary">
                        Ver detalle
                    </a>
                </div>

            </div>
        </div>
    {% empty %}
        <p>No hay obras disponibles</p>
    {% endfor %}
</div>

{% endblock %}
