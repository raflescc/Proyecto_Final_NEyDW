{% extends "base.html" %}

{% block content %}

<h2>Mis órdenes</h2>

<ul>
    {% for order in orders %}
        <li>
            <a href="{% url 'order_detail' order.id %}">
                Orden #{{ order.id }} - ${{ order.total }} - {{ order.status }}
            </a>
        </li>
    {% empty %}
        <li>No tienes órdenes</li>
    {% endfor %}
</ul>

{% endblock %}
