<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Marketplace Arte</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Marketplace</a>

        <div>
            {% if user.is_authenticated %}
                <span class="text-white me-2">Hola, {{ user.username }}</span>
                {% if user.role == 'artist' %}
                    <a class="btn btn-outline-light btn-sm me-2"
                    href="{% url 'create_artwork' %}">
                        Publicar obra
                    </a>
                {% endif %}
                <a class="btn btn-outline-light btn-sm me-2" href="{% url 'order_list' %}">Mis órdenes</a>
                <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a class="btn btn-outline-light btn-sm me-2" href="{% url 'login' %}">Login</a>
                <a class="btn btn-light btn-sm" href="{% url 'register' %}">Registro</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
